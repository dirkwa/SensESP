; ESP32-P4 ESP-Hosted-MCU C6 slave firmware OTA updater.
;
; Brings up native ethernet on the Waveshare ESP32-P4-WIFI6-POE-ETH
; board, attempts hostedInitBLE() to talk to the onboard ESP32-C6
; companion chip, and if the slave firmware is missing or older than
; the host's expected version, downloads the matching slave binary
; from the Espressif Arduino-ESP32 hosted CDN and flashes it to the
; C6 over the SDIO bus.
;
; This is a one-shot utility — flash it once, run it once to update
; the C6, then flash the BLE gateway firmware. The probe at
; examples/p4_esp_hosted_probe/ will pass after a successful update.
;
; Usage:
;   cd examples/p4_c6_ota_updater
;   pio run -t upload && pio device monitor

[platformio]
default_envs = waveshare_esp32p4_c6ota

[env]
upload_speed = 2000000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_unflags = -Werror=reorder
board_build.partitions = min_spiffs.csv

build_flags =
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
    -D USE_ESP_IDF_LOG

lib_ldf_mode = deep

lib_deps =
    ; Use the local SensESP working tree (gives us EthernetProvisioner).
    symlink://../..

[env:waveshare_esp32p4_c6ota]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino

board = esp32-p4
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

build_flags =
    ${env.build_flags}
    -D SENSESP_SSL_SUPPORT=1
    -DBOARD_HAS_PSRAM
