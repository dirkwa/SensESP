; PlatformIO project for the ESP-Hosted-MCU smoke test on the
; Waveshare ESP32-P4-WIFI6-POE-ETH board.
;
; This is the first step in M3 (BLE gateway). It brings up the
; ESP32-C6 companion chip via esp_hosted over SDIO and prints whether
; the slave firmware came up cleanly, what WiFi MAC it reports, and
; what the Bluetooth controller reports for itself. If this passes
; on the first boot, the C6 ships with pre-flashed esp_hosted_mcu
; slave firmware of a compatible version and we can proceed with the
; BLE gateway example. If it fails, we need to flash the C6 ourselves
; first via the P4's USB-C pass-through download mode.
;
; Usage:
;   cd examples/p4_esp_hosted_probe
;   pio run -t upload && pio device monitor

[platformio]
default_envs = waveshare_esp32p4_probe

[env]
upload_speed = 2000000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_unflags = -Werror=reorder
board_build.partitions = min_spiffs.csv

[env:waveshare_esp32p4_probe]
; Pinned pioarduino 55.03.37 — Arduino-ESP32 3.3.7, ESP-IDF v5.5.2.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
; Arduino-only (pioarduino still resolves idf_component.yml for managed
; IDF components like esp_hosted; we don't need the espidf framework
; in the framework list because that triggers an IDF linker-script mode
; that doesn't play nicely with the Arduino core's memory layout on P4).
framework = arduino

; Waveshare board: ESP32-P4 rev v1.3 with 16 MB flash and 32 MB PSRAM.
board = esp32-p4
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

; Serial maps to UART0 -> onboard CH340 -> host. Native USB-OTG is not
; exposed on this board, so leave ARDUINO_USB_CDC_ON_BOOT undefined.
build_flags =
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
    -D USE_ESP_IDF_LOG
    -DBOARD_HAS_PSRAM
