; Signal K BLE gateway running on Waveshare ESP32-P4-WIFI6-POE-ETH.
;
; Architecture:
;   - Native ESP32-P4 RMII Ethernet (M2's EthernetProvisioner) for the
;     IP link to the Signal K server. WiFi is disabled entirely.
;   - Onboard ESP32-C6 companion chip via SDIO (esp_hosted) provides
;     BLE 5 to the P4. Slave firmware must be flashed with
;     esp_hosted_mcu v2.11.6 — see ../p4_c6_ota_updater for one-shot
;     OTA updater that does this from the P4 side over the same
;     ethernet link this gateway uses.
;   - h2zero/esp-nimble-cpp 2.5.0 — IDF-native C++ NimBLE wrapper that
;     supports ESP-Hosted BT VHCI on ESP32-P4. (NimBLE-Arduino does
;     not compile on P4 because of unconditional esp_bt.h includes —
;     see h2zero/NimBLE-Arduino#906.)
;   - SensESP framework (this PR's transport-agnostic networking) for
;     hostname / web UI / SK WebSocket client / OTA / event loop.
;
; Speaks the signalk-server ble-provider-api dual-channel protocol:
;   - HTTP POST  /signalk/v2/api/ble/gateway/advertisements   (ad batches)
;   - WebSocket  /signalk/v2/api/ble/gateway/ws?token=<JWT>   (GATT control)
;
; Usage:
;   cd examples/p4_ble_gateway
;   pio run -t upload && pio device monitor

[platformio]
default_envs = waveshare_esp32p4_ble_gateway

[env]
upload_speed = 2000000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_unflags = -Werror=reorder
board_build.partitions = min_spiffs.csv

build_flags =
    ; CORE_DEBUG_LEVEL must be a numeric literal here (3 == INFO).
    ; esp-nimble-cpp's NimBLELog.h expands it inside a CPP token-paste
    ; that does not have access to the ARDUHAL_LOG_LEVEL_* enum names.
    -D CORE_DEBUG_LEVEL=3
    -D USE_ESP_IDF_LOG
    ; Pin esp-nimble-cpp's verbosity directly so its log macros pick a
    ; constant rather than falling back to CORE_DEBUG_LEVEL. 1 == WARN.
    ; Without this define, the library is very chatty during BLE scan.
    -D CONFIG_NIMBLE_CPP_LOG_LEVEL=1

; deep LDF so that SensESP's transitive deps (esp_websocket_client) are
; discovered through the symlinked library.
lib_ldf_mode = deep

lib_deps =
    ; Use the local SensESP working tree.
    symlink://../..
    ; h2zero/esp-nimble-cpp 2.5.x — IDF-flavoured C++ NimBLE wrapper
    ; with ESP32-P4 + ESP-Hosted BT VHCI support. Same NimBLEDevice /
    ; NimBLEScan / NimBLEClient API as NimBLE-Arduino. We pull it
    ; directly from the git tag because PIO's "framework = arduino"
    ; mode doesn't process project-local idf_component.yml files
    ; (only the Arduino core's). Pinning to a tag rather than master
    ; so the build is reproducible.
    https://github.com/h2zero/esp-nimble-cpp.git#2.5.0

[env:waveshare_esp32p4_ble_gateway]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino

board = esp32-p4
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

build_flags =
    ${env.build_flags}
    -D SENSESP_SSL_SUPPORT=1
    -DBOARD_HAS_PSRAM
    ; Override the gateway hostname here if you run more than one BLE
    ; gateway on the same network. The signalk-server provider uses
    ; this as the gateway_id, so it must be unique per device.
    -D GATEWAY_HOSTNAME='"signalk-ble-gw"'
