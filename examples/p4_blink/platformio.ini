; PlatformIO project for the ESP32-P4 blink smoke test.
;
; This is a downstream project (not part of the SensESP library build)
; that verifies the SensESP library + pioarduino 55.03.37 toolchain boot
; cleanly on a Waveshare ESP32-P4-WIFI6-POE-ETH board over USB-serial.
;
; Usage:
;   cd examples/p4_blink
;   pio run -t upload && pio device monitor

[platformio]
default_envs = waveshare_esp32p4

[env]
upload_speed = 2000000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = min_spiffs.csv

build_flags =
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE

[env:waveshare_esp32p4]
; Pinned pioarduino 55.03.37 — first release with ESP32-P4 rev.300 board
; definitions and Arduino-ESP32 3.3.7.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino

; The Waveshare ESP32-P4-WIFI6-POE-ETH board has ESP32-P4 ECO2 silicon
; (the early Engineering Sample / "_es" chip variant), not the rev.300
; production die. The ROM banner reports `esp32p4-eco2-20240710`.
; Use the `esp32-p4` board (chip_variant: esp32p4_es), with flash size
; overridden from the default 4 MB to the Waveshare's 16 MB.
board = esp32-p4
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    ; The Waveshare ESP32-P4-WIFI6-POE-ETH exposes a single USB-C port wired
    ; through a CH340 USB-UART bridge to the P4's UART0 (GPIO37/38). The
    ; P4's native USB-OTG is not exposed. So Serial must map to UART0, not
    ; to USB-CDC — leave ARDUINO_USB_CDC_ON_BOOT undefined.
